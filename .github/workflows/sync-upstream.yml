name: Sync Upstream

on:
  schedule:
    - cron: "0 */12* * *"
  workflow_dispatch:

permissions:

  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure Git
        run: |
          git config user.name github-actions
          git config user.email github-actions@github.com

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/pewdiepie-archdaemon/odysseus.git

      - name: Sync
        run: |
          git fetch upstream
          git checkout main
          git merge upstream/main --ff-only
          git push origin main